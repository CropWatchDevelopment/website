<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="120" viewBox="0 0 300 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clean vector icon of desktop, tablet, and phone with check marks</title>
  <desc id="desc">A desktop monitor, tablet, and smartphone, each showing a green check mark.</desc>

  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>

    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EEF4"/>
      <stop offset="100%" stop-color="#BAC8D6"/>
    </linearGradient>

    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F8FB"/>
      <stop offset="100%" stop-color="#D4DFEA"/>
    </linearGradient>

    <symbol id="check-badge" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" fill="#009B6B"/>
      <path d="M19 32.8L28.1 41.6L45.5 22.4" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- Desktop monitor -->
  <g id="desktop">
    <path d="M11 95H120" stroke="#D9E2EB" stroke-width="2" stroke-linecap="round"/>
    <rect x="2.5" y="13.5" width="110" height="74" rx="5.5" fill="url(#edgeGrad)" stroke="#8EA4B8" stroke-width="3"/>
    <rect x="8" y="19" width="99" height="63" rx="3.5" fill="url(#screenGrad)"/>
    <path d="M47 88H68L72 102H43L47 88Z" fill="url(#baseGrad)" stroke="#8EA4B8" stroke-width="2" stroke-linejoin="round"/>
    <path d="M34 105H82" stroke="#8EA4B8" stroke-width="3" stroke-linecap="round"/>
    <path d="M42 102H75" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
    <!-- centered in 99x63 screen -->
    <use href="#check-badge" x="28" y="21" width="59" height="59"/>
  </g>

  <!-- Tablet -->
  <g id="tablet">
    <rect x="112.5" y="2.5" width="89" height="113" rx="10.5" fill="url(#edgeGrad)" stroke="#A9BBCB" stroke-width="3"/>
    <rect x="120" y="13" width="74" height="90" rx="3.5" fill="url(#screenGrad)"/>
    <circle cx="157" cy="8.5" r="2" fill="#AFC0CF"/>
    <circle cx="157" cy="109.5" r="5" fill="#F2F6FA" stroke="#B8C6D3" stroke-width="1.5"/>
    <!-- centered in 74x90 screen -->
    <use href="#check-badge" x="125" y="26" width="64" height="64"/>
  </g>

  <!-- Phone -->
  <g id="phone">
    <rect x="190.5" y="12.5" width="65" height="97" rx="11.5" fill="url(#edgeGrad)" stroke="#A9BBCB" stroke-width="3"/>
    <rect x="197" y="25" width="52" height="72" rx="2.8" fill="url(#screenGrad)"/>
    <circle cx="223" cy="19" r="1.8" fill="#AFC0CF"/>
    <circle cx="223" cy="103" r="4.2" fill="#F2F6FA" stroke="#B8C6D3" stroke-width="1.3"/>
    <use href="#check-badge" x="203" y="39" width="40" height="40"/>
  </g>
</svg>
