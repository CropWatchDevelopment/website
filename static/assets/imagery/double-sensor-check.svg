<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640">
	<title>ダブルセンサー健全性チェックの仕組み</title>
	<desc>2つの温湿度センサーの測定値を回帰分析に反映し、過去の関係性と比較して通常データまたはエラーとして処理する流れ</desc>
	<defs>
		<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M1 1l7 4-7 4z" fill="#2c6cb7" />
		</marker>
		<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M1 1l7 4-7 4z" fill="#0e9960" />
		</marker>
		<marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M1 1l7 4-7 4z" fill="#dd0f0f" />
		</marker>
	</defs>

	<rect x="1" y="1" width="758" height="638" rx="28" fill="#f8fafc" stroke="#d7e0f5" stroke-width="2" />
	<text x="40" y="50" fill="#245a9c" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">10分ごとのデータ取得</text>
	<text x="40" y="83" fill="#0b1730" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="25" font-weight="800">2系統で測定し、関係性を確認</text>

	<rect x="40" y="116" width="300" height="126" rx="18" fill="#ffffff" stroke="#b4ccf0" stroke-width="2" />
	<circle cx="82" cy="158" r="21" fill="#eef4fc" />
	<path d="M82 143v23m0 0a8 8 0 1 0 8 8 8 8 0 0 0-8-8zm0-15a6 6 0 0 0-6 6v24" fill="none" stroke="#2c6cb7" stroke-linecap="round" stroke-width="4" />
	<text x="118" y="150" fill="#4a5d7e" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700">センサー A</text>
	<text x="118" y="176" fill="#0b1730" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="21" font-weight="800">SHT43</text>
	<text x="70" y="218" fill="#4a5d7e" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14">温度・湿度を独立して測定</text>

	<rect x="420" y="116" width="300" height="126" rx="18" fill="#ffffff" stroke="#93e0bd" stroke-width="2" />
	<circle cx="462" cy="158" r="21" fill="#e9f9f1" />
	<path d="M462 143v23m0 0a8 8 0 1 0 8 8 8 8 0 0 0-8-8zm0-15a6 6 0 0 0-6 6v24" fill="none" stroke="#0e9960" stroke-linecap="round" stroke-width="4" />
	<text x="498" y="150" fill="#4a5d7e" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700">センサー B</text>
	<text x="498" y="176" fill="#0b1730" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="21" font-weight="800">SHT40</text>
	<text x="450" y="218" fill="#4a5d7e" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14">温度・湿度を独立して測定</text>

	<path d="M190 243v34h140" fill="none" stroke="#2c6cb7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" marker-end="url(#arrow-blue)" />
	<path d="M570 243v34H430" fill="none" stroke="#0e9960" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" marker-end="url(#arrow-green)" />

	<rect x="120" y="294" width="520" height="150" rx="20" fill="#11213c" />
	<text x="154" y="329" fill="#9ab0d6" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13" font-weight="700">健全性チェック</text>
	<text x="154" y="359" fill="#e7ecff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="21" font-weight="800">両方の測定値を回帰分析へ反映</text>
	<line x1="154" y1="382" x2="606" y2="382" stroke="#2f5387" stroke-width="1" />
	<circle cx="170" cy="413" r="13" fill="#2c6cb7" />
	<text x="170" y="418" fill="#ffffff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="12" font-weight="800" text-anchor="middle">1</text>
	<text x="191" y="418" fill="#cfd8ff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13">同時に取得</text>
	<circle cx="338" cy="413" r="13" fill="#2c6cb7" />
	<text x="338" y="418" fill="#ffffff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="12" font-weight="800" text-anchor="middle">2</text>
	<text x="359" y="418" fill="#cfd8ff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13">関係性を更新</text>
	<circle cx="504" cy="413" r="13" fill="#2c6cb7" />
	<text x="504" y="418" fill="#ffffff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="12" font-weight="800" text-anchor="middle">3</text>
	<text x="525" y="418" fill="#cfd8ff" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="13">乖離を確認</text>

	<path d="M310 445v35H198v25" fill="none" stroke="#0e9960" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" marker-end="url(#arrow-green)" />
	<path d="M450 445v35h112v25" fill="none" stroke="#dd0f0f" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" marker-end="url(#arrow-red)" />

	<rect x="40" y="512" width="320" height="90" rx="18" fill="#e9f9f1" stroke="#57cd99" stroke-width="2" />
	<circle cx="82" cy="557" r="20" fill="#0e9960" />
	<path d="M72 557l7 7 14-16" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" />
	<text x="116" y="548" fill="#086241" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700">関係性の範囲内</text>
	<text x="116" y="575" fill="#04392a" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="17" font-weight="800">通常データとして記録</text>

	<rect x="400" y="512" width="320" height="90" rx="18" fill="#fff1f1" stroke="#eb2f2f" stroke-width="2" />
	<circle cx="442" cy="557" r="20" fill="#dd0f0f" />
	<path d="M435 550l14 14m0-14-14 14" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="4" />
	<text x="476" y="548" fill="#a20c0c" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="14" font-weight="700">関係性から大きく乖離</text>
	<text x="476" y="575" fill="#741010" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="17" font-weight="800">通常データにせずエラー表示</text>
</svg>
