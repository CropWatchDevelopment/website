<!doctype html>
<html lang="ja" data-theme="web">
	<head>
		<meta charset="utf-8" />
		<!-- Same icon set as app.cropwatch.io: Google prefers the large transparent
		     PNG for search results (the SVG has a white background, which renders as
		     a white disc in the SERP circle if it's the only icon offered). -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" sizes="any" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/cropwatch_icons/icon-32x32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="%sveltekit.assets%/cropwatch_icons/icon-192x192.png" sizes="192x192" type="image/png" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/cropwatch_icons/apple-touch-icon.png" sizes="180x180" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="jp">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
